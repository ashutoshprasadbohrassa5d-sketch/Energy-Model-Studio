// ParticleCanvas
// ══════════════════════════════════════════════════════════════════════════════
const ParticleCanvas = () => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [], raf;
    const resize = () => {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight; init();
    };
    const init = () => {
      particles = [];
      const n = Math.floor((canvas.width * canvas.height) / 10000);
      for (let i = 0; i < n; i++)
        particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height,
          vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5,
          size:Math.random()*2+.5, alpha:Math.random()*.5+.1 });
    };
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach((p,i) => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,230,118,${p.alpha})`; ctx.fill();
        for(let j=i+1;j<particles.length;j++){
          const p2=particles[j], dx=p.x-p2.x, dy=p.y-p2.y, d=Math.sqrt(dx*dx+dy*dy);
          if(d<100){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle=`rgba(0,176,255,${.2*(1-d/100)})`; ctx.stroke(); }
        }
      });
      raf = requestAnimationFrame(draw);
    };
    window.addEventListener('resize',resize); resize(); draw();
    return () => { window.removeEventListener('resize',resize); cancelAnimationFrame(raf); };
  },[]);
  return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none" style={{opacity:.6}} />;
};

const Counter = ({ end, label }) => {
  const [count,setCount]=useState(0);
  useEffect(()=>{
    const isInf=end==='∞', fv=isInf?100:Number(end), t0=performance.now();
    const anim=t=>{ const p=Math.min((t-t0)/2000,1); setCount(Math.floor(p*fv)); if(p<1)requestAnimationFrame(anim); };
    requestAnimationFrame(anim);
  },[end]);
  return (
    <div className="flex flex-col items-center glass-card p-6 rounded-xl border border-white/10 glow-blue">
      <div className="text-4xl font-bold text-white mb-2">{end==='∞'?(count===100?'∞':count):count}</div>
      <div className="text-sm text-gray-400 uppercase tracking-wider">{label}</div>
    </div>
  );
};

const CircularProgress = ({ percent, color, size=100 }) => {
  const r=40, c=2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="8"/>

        strokeDasharray={c} strokeDashoffset={c-(percent/100)*c}
        transform="rotate(-90 50 50)"
        style={{transition:'stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)',filter:`drop-shadow(0 0 6px ${color})`}}/>
      <text x="50" y="54" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold">{percent}%</text>
    </svg>

};
const AnimatedCount = ({ end, suffix, active }) => {
  const [n,setN]=useState(0);
  useEffect(()=>{
    if(!active)return;
    let t0=null;
    const step=ts=>{ if(!t0)t0=ts; const p=Math.min((ts-t0)/2000,1); setN(Math.floor((1-Math.pow(1-p,3))*end)); if(p<1)requestAnimationFrame(step); else setN(end); };
    requestAnimationFrame(step);
  },[end,active]);
  return <span>{n.toLocaleString()}<span className="text-xl ml-1">{suffix}</span></span>;
};
const MetricCard = ({ title, value, suffix, percent, color, icon:Icon, description }) => {
  const [active,setActive]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting)setActive(true); },{threshold:.3});
    if(ref.current)obs.observe(ref.current); return()=>obs.disconnect();
  },[]);
  return (
    <div ref={ref} className="glass-card p-6 rounded-2xl flex flex-col items-center text-center"
      style={{border:`1px solid ${color}40`,boxShadow:`0 0 20px ${color}20`}}>
      <div className="flex items-center gap-2 mb-4"><Icon size={20} style={{color}}/><span className="text-sm text-gray-300 font-medium uppercase tracking-wide">{title}</span></div>
      <CircularProgress percent={active?percent:0} color={color} size={100}/>
      <div className="mt-4 text-3xl font-bold" style={{color}}><AnimatedCount end={value} suffix={suffix} active={active}/></div>
      <p className="mt-2 text-xs text-gray-500 leading-relaxed">{description}</p>
    </div>
  );
};

  {title:'Injective Function', math:'$f(a_1) = f(a_2) \\implies a_1 = a_2$',                          desc:'One-to-one: Distinct elements map to distinct elements.',                   color:'#ffd600'},
  {title:'Surjective Function',math:'$\\forall b \\in B, \\exists a \\in A \\text{ s.t. } f(a) = b$', desc:'Onto: Every element in the codomain is mapped to.',                        color:'#e040fb'},
  {title:'Linear Function',    math:'$f(x) = mx + c$',                                                 desc:'Constant rate of change. Forms a straight line.',                          color:'#00e676'},
  {title:'Quadratic Function', math:'$g(x) = ax^2 + bx + c$',                                         desc:'Forms a parabola. Models optimization and diminishing returns.',             color:'#00b0ff'},
  {title:'Identity Function',  math:'$i(x) = x$',                                                      desc:'Output exactly equals input. Models perfect 1:1 transfer.',                color:'#ffd600'},
  {title:'Bijective Function', math:'$f \\text{ is injective } \\land \\text{ surjective}$',           desc:'Perfect one-to-one correspondence between sets.',                          color:'#e040fb'},
];

const questions=[
  {id:1,topic:'Cartesian Product',question:'If A = {Solar, Wind} and B = {Land Use, Noise}, how many elements are in A × B?',options:['2','4','6','8'],correct:1,explanation:'A × B contains every ordered pair (a, b) where a ∈ A and b ∈ B. With |A| = 2 and |B| = 2, |A × B| = 2 × 2 = 4.'},
  {id:2,topic:'Relation',question:'Which statement correctly describes a relation R ⊆ A × B?',options:['R must contain all pairs in A × B','R is any subset of the Cartesian product A × B','R must map every element of A to exactly one element of B','R only contains pairs where both elements are equal'],correct:1,explanation:'A relation R is simply any subset of A × B. It can be the full product, a partial selection, or even empty.'},
  {id:3,topic:'Injective Function',question:'In our ward-to-grid mapping (Ward 1→Solar, Ward 2→Wind, Ward 3→Hydro, Ward 4→Biogas). Why is this injective?',options:['Every grid is assigned to a ward','No two wards share the same micro-grid','Each ward is assigned exactly two grids','The mapping includes all possible pairs'],correct:1,explanation:'A function is injective when distinct inputs produce distinct outputs: f(a₁) = f(a₂) ⟹ a₁ = a₂. No two wards share a grid.'},
  {id:4,topic:'Surjective Function',question:'For a function to be surjective (onto), which condition must hold?',options:['Every element in the domain maps to itself','No two elements share the same output','Every element in the codomain is the image of at least one input','The domain and codomain must have the same size'],correct:2,explanation:'Surjective means every b ∈ B has some a ∈ A with f(a) = b. Every micro-grid is assigned — none goes unused.'},
  {id:5,topic:'Linear Function',question:'Using f(x) = 50x + 100, what is the carbon offset after 6 years?',options:['300 tonnes','400 tonnes','500 tonnes','600 tonnes'],correct:1,explanation:'f(6) = 50 × 6 + 100 = 300 + 100 = 400 tonnes CO₂.'},
  {id:6,topic:'Quadratic Function',question:'For g(x) = −0.5x² + 8x + 20, at what capacity (GW) is efficiency maximised?',options:['4 GW','6 GW','8 GW','10 GW'],correct:2,explanation:'Vertex at x = −b/(2a) = −8/(2×−0.5) = 8 GW. Maximum efficiency g(8) = 52.'},
  {id:7,topic:'Identity Function',question:'A household consumes 175 kWh. Using i(x) = x, how many credits do they receive?',options:['100 Credits','150 Credits','175 Credits','200 Credits'],correct:2,explanation:'i(175) = 175. The identity function returns exactly its input.'},
  {id:8,topic:'Bijective Function',question:'Our ward-to-grid function is bijective. Which pair of properties does that require?',options:['Reflexive and transitive','Injective and surjective','Linear and quadratic','Symmetric and antisymmetric'],correct:1,explanation:'A bijection is both injective (one-to-one) and surjective (onto), guaranteeing a perfect one-to-one correspondence.'},
];
const tColors={'Cartesian Product':'#00e676','Relation':'#00b0ff','Injective Function':'#ffd600','Surjective Function':'#e040fb','Linear Function':'#00e676','Quadratic Function':'#ffd600','Identity Function':'#00b0ff','Bijective Function':'#e040fb'};

const QuizSection = () => {
  const [cur,setCur]=useState(0);
  const [ans,setAns]=useState({});
  const [showExp,setShowExp]=useState(false);
  const [done,setDone]=useState(false);
  useEffect(()=>{ window.MathJax?.typesetPromise?.(); },[cur]);
  const q=questions[cur], a=ans[q.id]??null, color=tColors[q.topic]??'#00e676';
  const score=Object.values(ans).filter(x=>x?.correct).length;
  const pct=Math.round((score/questions.length)*100);
  const grade=pct>=90?'Outstanding':pct>=75?'Excellent':pct>=60?'Good':'Keep Practising';
  const gc=pct>=90?'#00e676':pct>=75?'#00b0ff':pct>=60?'#ffd600':'#e040fb';
  const handleSel=idx=>{ if(a)return; setAns(p=>({...p,[q.id]:{selected:idx,correct:idx===q.correct}})); setShowExp(true); };
  const handleNext=()=>{ if(cur<questions.length-1){setCur(c=>c+1);setShowExp(false);}else setDone(true); };
  const handleReset=()=>{ setCur(0);setAns({});setShowExp(false);setDone(false); };

  return (
    <section id="quiz" className="py-24 px-6" style={{background:'rgba(6,13,26,.3)'}}>
      <div className="max-w-3xl mx-auto">
        <div className="text-center mb-12">
          <h2 className="text-4xl font-bold text-white mb-4">Knowledge Check</h2>
          <p className="text-gray-400 text-lg max-w-xl mx-auto">Test your understanding of the mathematical concepts explored in this project.</p>
        </div>
        {done ? (
          <div className="glass-card p-10 rounded-2xl border border-white/10 text-center">
            <Trophy size={56} className="mx-auto mb-4" style={{color:gc}}/>
            <h3 className="text-3xl font-bold text-white mb-2">{grade}!</h3>
            <p className="text-gray-400 mb-6">You answered {score} out of {questions.length} correctly.</p>
            <div className="flex justify-center mb-8">
              <svg width="140" height="140" viewBox="0 0 140 140">
                <circle cx="70" cy="70" r="56" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="10"/>
                <circle cx="70" cy="70" r="56" fill="none" stroke={gc} strokeWidth="10" strokeLinecap="round"
                  strokeDasharray={`${2*Math.PI*56}`} strokeDashoffset={`${2*Math.PI*56*(1-pct/100)}`}
                  transform="rotate(-90 70 70)" style={{filter:`drop-shadow(0 0 8px ${gc})`,transition:'stroke-dashoffset 1s ease'}}/>
                <text x="70" y="65" textAnchor="middle" fill="white" fontSize="26" fontWeight="bold">{pct}%</text>
                <text x="70" y="84" textAnchor="middle" fill="#9ca3af" fontSize="11">{score}/{questions.length} correct</text>
              </svg>
            </div>
            <div className="grid grid-cols-4 gap-2 mb-8">
              {questions.map((q,i)=>{ const a2=ans[q.id]; return (
                <div key={q.id} className="p-2 rounded-lg text-xs font-medium text-center"
                  style={{background:a2?.correct?'rgba(0,230,118,.15)':'rgba(255,82,82,.15)',
                    border:`1px solid ${a2?.correct?'rgba(0,230,118,.4)':'rgba(255,82,82,.4)'}`,
                    color:a2?.correct?'#00e676':'#ff5252'}}>Q{i+1}</div>
              );})}
            </div>
            <button onClick={handleReset} className="flex items-center gap-2 mx-auto px-6 py-3 rounded-xl font-semibold text-sm"
              style={{background:'rgba(0,230,118,.15)',border:'1px solid rgba(0,230,118,.4)',color:'#00e676',cursor:'pointer'}}>
              <RotateCcw size={16}/> Try Again
            </button>
          </div>
        ) : (
          <div>
            <div className="flex items-center gap-4 mb-6">
              <div className="flex-1 rounded-full overflow-hidden" style={{height:6,background:'rgba(255,255,255,.1)'}}>
                <div className="h-full rounded-full transition-all duration-500" style={{width:`${(cur/questions.length)*100}%`,background:color}}/>
              </div>
              <span className="text-sm text-gray-400 whitespace-nowrap">{cur+1} / {questions.length}</span>
            </div>
            <div className="glass-card p-8 rounded-2xl" style={{border:`1px solid ${color}30`,boxShadow:`0 0 30px ${color}10`}}>
              <span className="inline-block px-3 py-1 rounded-full text-xs font-semibold mb-5 uppercase tracking-wider"
                style={{background:`${color}20`,border:`1px solid ${color}40`,color}}>{q.topic}</span>
              <h3 className="text-xl font-bold text-white mb-7 leading-relaxed">{q.question}</h3>
              <div className="space-y-3 mb-6">
                {q.options.map((opt,idx)=>{
                  const isSel=a?.selected===idx, isCorr=idx===q.correct;
                  let bg='rgba(255,255,255,.04)', border='rgba(255,255,255,.1)', tc='#d1d5db';
                  if(a){ if(isCorr){bg='rgba(0,230,118,.15)';border='rgba(0,230,118,.5)';tc='#00e676';}
                    else if(isSel&&!isCorr){bg='rgba(255,82,82,.15)';border='rgba(255,82,82,.5)';tc='#ff5252';} }
                  return (
                    <button key={idx} onClick={()=>handleSel(idx)} disabled={!!a}
                      className="w-full text-left flex items-center gap-4 px-5 py-4 rounded-xl transition-all duration-200"
                      style={{background:bg,border:`1px solid ${border}`,color:tc,cursor:a?'default':'pointer'}}>
                      <span className="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold"
                        style={{background:a?'transparent':'rgba(255,255,255,.08)',border:`1px solid ${border}`,color:tc}}>
                        {a&&isCorr?<CheckCircle size={16}/>:a&&isSel?<XCircle size={16}/>:String.fromCharCode(65+idx)}
                      </span>
                      <span className="text-sm leading-relaxed">{opt}</span>
                    </button>
                  );
                })}
              </div>
              {showExp && (
                <div className="rounded-xl p-4 mb-6 text-sm leading-relaxed"
                  style={{background:a?.correct?'rgba(0,230,118,.08)':'rgba(255,82,82,.08)',border:`1px solid ${a?.correct?'rgba(0,230,118,.25)':'rgba(255,82,82,.25)'}`,color:'#d1d5db'}}>
                  <span className="font-semibold" style={{color:a?.correct?'#00e676':'#ff5252'}}>{a?.correct?'Correct! ':'Not quite. '}</span>
                  {q.explanation}
                </div>
              )}
              {a && (
                <button onClick={handleNext} className="flex items-center gap-2 ml-auto px-6 py-3 rounded-xl font-semibold text-sm"
                  style={{background:`${color}20`,border:`1px solid ${color}50`,color,cursor:'pointer'}}>
                  {cur<questions.length-1?'Next Question':'See Results'}<ChevronRight size={16}/>
                </button>
              )}
            </div>
            <div className="flex items-center gap-2 mt-5 justify-center">
              {questions.map((_,i)=>{ const a2=ans[questions[i].id]; return (
                <div key={i} className="w-2 h-2 rounded-full transition-all"
                  style={{background:i===cur?color:a2?.correct?'rgba(0,230,118,.5)':a2?'rgba(255,82,82,.5)':'rgba(255,255,255,.12)',
                    transform:i===cur?'scale(1.5)':'scale(1)'}}/>
              );})}
            </div>
          </div>
        )}
      </div>
    </section>
  );
};
